  # T-039 新增 4 条 — frps 运行时监控 API 代理
  # 鉴权：cookieAuth（与既有 read 端点一致）
  # 凭据合并：frps.config（用户填值）优先 → frps.dashboard.autogen（启动期自动生成）fallback
  # 上游错误映射：401 → 502（区分本应用 401 SessionAuth）/ 404 → 404 / 连接拒绝 / 5xx → 503

  /api/v1/server/runtime/info:
    get:
      summary: 获取 frps 服务概览（代理 frps /api/serverinfo）
      operationId: getServerRuntimeInfo
      tags: [server-runtime]
      responses:
        '200':
          description: frps 服务概览
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerRuntimeInfo'
        '401':
          description: 未登录
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'
        '502':
          description: 上游 frps dashboard 凭据校验失败
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'
        '503':
          description: frps dashboard 未启用 / 进程不可达
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'

  /api/v1/server/runtime/proxies:
    get:
      summary: 聚合查询全部 type 的 proxy 状态（代理 frps /api/proxy/{type} × N）
      operationId: getServerRuntimeProxies
      tags: [server-runtime]
      responses:
