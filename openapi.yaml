          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerRuntimeProxiesResponse'
        '401':
          description: 未登录
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'
        '502':
          description: 上游凭据校验失败
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'
        '503':
          description: dashboard 未启用 / 全部 type 上游均不可达
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'

