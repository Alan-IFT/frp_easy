          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'
        '502':
          description: 上游凭据校验失败
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'
        '503':
          description: dashboard 未启用 / frps 不可达
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'

