        - cookieAuth: []
          csrfToken: []
      tags: [proc]
      parameters:
        - name: kind
          in: path
          required: true
          schema:
            type: string
            enum: [frpc, frps]
      responses:
        '200':
          description: 启动后的进程信息
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProcessInfo'
        '400':
          description: kind 非法
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'
        '401':
          description: 未登录
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'
        '409':
          description: 进程已在运行（PROC_BUSY）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'
        '422':
          description: 二进制缺失（BIN_MISSING）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'

  /api/v1/proc/{kind}/stop:
    post:
      summary: 停止 frpc 或 frps 进程
