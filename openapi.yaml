openapi: "3.0.3"
info:
  title: frp_easy REST API
  version: "0.1.0"
  description: |
    frp_easy Web UI 的 REST API。
    认证方式：Cookie（frp_easy_sid）。
    写操作（POST/PUT/DELETE，在受保护分组中）额外需要 X-CSRF-Token 请求头，
    该令牌由 GET /api/v1/auth/csrf 获取。

servers:
  - url: http://127.0.0.1:7800
    description: 默认本地服务器

security:
  - cookieAuth: []

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: frp_easy_sid
      description: 登录后由服务端写入的 session cookie
    csrfToken:
      type: apiKey
      in: header
      name: X-CSRF-Token
      description: 由 GET /api/v1/auth/csrf 获取，写操作必须携带

  schemas:

    ErrorDetail:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          description: 错误码，见 internal/httpapi/errors.go
          example: VALIDATION_FAILED
        message:
          type: string
          description: 人类可读的错误描述
        field:
          type: string
          description: 出错的字段名（可选）

    ErrorBody:
      type: object
      required: [error]
      properties:
        error:
          $ref: '#/components/schemas/ErrorDetail'

    OkResponse:
      type: object
      required: [ok]
      properties:
        ok:
          type: boolean

    HealthResponse:
      type: object
      required: [status, version]
      properties:
        status:
          type: string
          example: ok
        version:
          type: string
          example: "0.1.0"

    SystemReady:
      type: object
      required: [initialized, binMissing, version]
      properties:
        initialized:
          type: boolean
          description: 管理员账号是否已设置
        binMissing:
          type: array
          items:
            type: string
          description: 缺失的 frp 二进制列表（空表示全部就绪）
        version:
          type: string
          example: "0.1.0"

    SetupRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string

    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string

    LoginResponse:
      type: object
      required: [ok]
      properties:
        ok:
          type: boolean

    MeResponse:
      type: object
      required: [username]
      properties:
        username:
          type: string

    CSRFResponse:
      type: object
      required: [csrfToken]
      properties:
        csrfToken:
          type: string

    ChangePasswordRequest:
      type: object
      required: [oldPassword, newPassword]
      properties:
        oldPassword:
          type: string
        newPassword:
          type: string

    ModeState:
      type: object
      required: [frpc, frps]
      properties:
        frpc:
          type: boolean
          description: frpc 进程是否应处于运行状态
        frps:
          type: boolean
          description: frps 进程是否应处于运行状态

    ProxyInput:
      type: object
      required: [name, type, localPort]
      properties:
        name:
          type: string
        type:
          type: string
          description: "tcp | udp | http | https"
        localIP:
          type: string
          description: 本地监听 IP，默认 127.0.0.1
        localPort:
          type: integer
        remotePort:
          type: integer
          description: tcp/udp 必填；http/https 禁填
        customDomains:
          type: array
          items:
            type: string
          description: http/https 必填（≥1 项）；tcp/udp 禁填
        enabled:
          type: boolean
          description: 默认 true
        version:
          type: integer
          format: int64
          description: PUT 时必填（乐观锁）

    ProxyResponse:
      type: object
      required: [id, name, type, localIP, localPort, enabled, version, updatedAt]
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        type:
          type: string
        localIP:
          type: string
        localPort:
          type: integer
        remotePort:
          type: integer
          description: tcp/udp 类型才有此字段
        customDomains:
          type: array
          items:
            type: string
          description: http/https 类型才有此字段
        enabled:
          type: boolean
        version:
          type: integer
          format: int64
        updatedAt:
          type: string
          format: date-time
          example: "2026-05-16T10:00:00Z"

    FrpsConfig:
      type: object
      required: [bindPort]
      properties:
        bindPort:
          type: integer
          description: frps 监听端口，默认 7000
        authMethod:
          type: string
          description: "token | oidc | 空字符串"
        authToken:
          type: string
          description: GET 时脱敏为 ***（除非 ?reveal=1）
        dashboardEnabled:
          type: boolean
        dashboardAddr:
          type: string
        dashboardPort:
          type: integer
        dashboardUser:
          type: string
        dashboardPass:
          type: string

    FrpcServerConn:
      type: object
      required: [serverAddr, serverPort]
      properties:
        serverAddr:
          type: string
          description: frps 服务器地址
        serverPort:
          type: integer
          description: frps 服务器端口
        authMethod:
          type: string
        authToken:
          type: string
          description: GET 时脱敏为 ***（除非 ?reveal=1）

    ProcessInfo:
      type: object
      required: [kind, state, pid, changedAt]
      properties:
        kind:
          type: string
          description: "frpc | frps"
        state:
          type: string
          enum: [stopped, starting, running, stopping, error]
        pid:
          type: integer
          description: 进程 PID，未运行时为 0
        lastErr:
          type: string
          description: 最后一次错误信息（可选）
        changedAt:
          type: string
          format: date-time

    ProcStatusResponse:
      type: object
      required: [frpc, frps]
      properties:
        frpc:
          $ref: '#/components/schemas/ProcessInfo'
        frps:
          $ref: '#/components/schemas/ProcessInfo'

    LogsTailResponse:
      type: object
      required: [lines]
      properties:
        lines:
          type: array
          items:
            type: string
          description: 尾部 N 行日志（默认 500，最多 5000）

    LogsIncrementalResponse:
      type: object
      required: [data, nextOffset]
      properties:
        data:
          type: string
          description: 自上次 offset 起的新增日志文本
        nextOffset:
          type: integer
          format: int64
          description: 下次轮询使用的 offset 值

    PublicIPResponse:
      type: object
      properties:
        ip:
          type: string
          description: 检测到的公网 IP（成功时）
        error:
          type: string
          description: 错误描述（超时时）
        advisory:
          type: string
          description: IPv6 使用提示（IP 为 IPv6 时）
        source:
          type: string
          description: "T-018 新增：胜出源标识（ipify / my-ip.io / ip.cn / bilibili / ip.cn-html / env）。env 表示通过 FRP_EASY_PUBLIC_IP 环境变量覆盖。"

    DownloadBinRequest:
      type: object
      required: [kind]
      properties:
        kind:
          type: string
          description: "frpc | frps"

    DownloadState:
      type: object
      required: [status, progress]
      properties:
        status:
          type: string
          enum: [idle, downloading, success, failed, canceled]
          description: |
            下载状态机：
            - idle: 从未发起
            - downloading: 进行中
            - success: 已落盘
            - failed: 网络 / 解压 / 落盘错误
            - canceled: 用户主动取消（T-027）
        progress:
          type: integer
          description: 下载进度 0-100
        error:
          type: string
          description: 错误信息（status=failed 或 canceled 时）

    WizardStatus:
      type: object
      required: [handled, shouldShow]
      properties:
        handled:
          type: boolean
          description: wizard 是否已被处理（完成或跳过）
        shouldShow:
          type: boolean
          description: 是否应当显示向导（!handled && !hasAnyConfig）

    # T-018 新增 schemas

    UploadBinResponse:
      type: object
      required: [ok, kind, sha256, size, path]
      properties:
        ok:
          type: boolean
        kind:
          type: string
          enum: [frpc, frps]
        sha256:
          type: string
          description: 上传文件的 SHA-256 (hex)
        size:
          type: integer
          format: int64
        path:
          type: string
          description: 相对仓库 root 的相对路径（例 frp_linux/frpc）
        advisory:
          type: string
          description: 仅当同 kind 子进程正在运行时附带（提示用户手动重启）

    # T-039 新增 schemas — frps 运行时监控（代理 frps admin HTTP API）

    ServerRuntimeInfo:
      type: object
      description: |
        frps /api/serverinfo 响应透传（仅取常用字段；其它字段 omitempty 透传）。
        前端用此构建"frps 服务概览"卡片。
      properties:
        version:
          type: string
          description: frps 版本号（如 "0.58.1"）
        bindPort:
          type: integer
        kcpBindPort:
          type: integer
        quicBindPort:
          type: integer
        vhostHTTPPort:
          type: integer
        vhostHTTPSPort:
          type: integer
        tcpmuxHTTPConnectPort:
          type: integer
        subdomainHost:
          type: string
        maxPoolCount:
          type: integer
          format: int64
        maxPortsPerClient:
          type: integer
          format: int64
        heartbeatTimeout:
          type: integer
          format: int64
        clientCounts:
          type: integer
          description: 当前在线 client 数
        curConns:
          type: integer
          description: 当前活动连接数
        proxyTypeCount:
          type: object
          additionalProperties:
            type: integer
          description: 按 type 统计的 proxy 数（如 {"tcp":2,"http":1}）
        totalTrafficIn:
          type: integer
          format: int64
        totalTrafficOut:
          type: integer
          format: int64

    ServerRuntimeProxyStatus:
      type: object
      description: 单条 proxy 状态（用于 /server/runtime/proxies 数组项 + /proxy/{type}/{name} 单条）。
      required: [name]
      properties:
        name:
          type: string
        type:
          type: string
          description: "tcp | udp | http | https | stcp | sudp | xtcp"
        status:
          type: string
          description: "online | offline"
        lastStartTime:
          type: string
        lastCloseTime:
          type: string
        todayTrafficIn:
          type: integer
          format: int64
        todayTrafficOut:
          type: integer
          format: int64
        curConns:
          type: integer
        clientVersion:
          type: string
        conf:
          type: object
          description: frps 上游 conf 透传（结构因 proxy type 不同）
          additionalProperties: true

    ServerRuntimeProxiesResponse:
      type: object
      description: |
        聚合 N 个 type 的 proxy 列表。
        部分 type 上游失败 → errors[type] 含错误文案，整体仍 200（Q-1 PM-DECIDED）。
        全部 type 都 fatal → handler 返 503，不进 200 body。
      required: [proxies]
      properties:
        proxies:
          type: object
          additionalProperties:
            type: array
            items:
              $ref: '#/components/schemas/ServerRuntimeProxyStatus'
          description: key = proxy type；value = 该 type 下所有 proxy 数组
        errors:
          type: object
          additionalProperties:
            type: string
          description: 仅当 per-type 失败时出现；key = type，value = 错误文案

    ServerRuntimeTraffic:
      type: object
      description: 单条 proxy 的日级流量序列（透传 frps /api/traffic/{name}）。
      required: [name, trafficIn, trafficOut]
      properties:
        name:
          type: string
        trafficIn:
          type: array
          items:
            type: integer
            format: int64
        trafficOut:
          type: array
          items:
            type: integer
            format: int64

paths:

  /api/v1/health:
    get:
      summary: 存活探针（轻量，不经过 ReadyGate）
      operationId: getHealth
      security: []
      tags: [system]
      responses:
        '200':
          description: 服务存活
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /api/v1/system/ready:
    get:
      summary: 就绪检查（返回初始化状态和缺失二进制列表）
      operationId: getSystemReady
      security: []
      tags: [system]
      responses:
        '200':
          description: 就绪状态
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemReady'
        '503':
          description: 服务未就绪（ReadyGate 拦截）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'

  /api/v1/setup:
    post:
      summary: 初始化管理员账号（只能调用一次）
      operationId: setup
      security: []
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetupRequest'
      responses:
        '200':
          description: 初始化成功，同时写入 session cookie
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'
        '400':
          description: 请求体非法 JSON
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'
        '409':
          description: 已初始化（ALREADY_INITIALIZED）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'
        '422':
          description: 用户名或密码校验失败
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'

  /api/v1/auth/login:
    post:
      summary: 登录
      operationId: login
      security: []
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: 登录成功，写入 frp_easy_sid cookie
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          description: 请求体非法 JSON
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'
        '401':
          description: 用户名或密码错误，或未初始化
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'
        '429':
          description: 登录尝试过多（RATE_LIMITED），响应头含 Retry-After
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'

  /api/v1/auth/logout:
    post:
      summary: 登出（清除 session）
      operationId: logout
      security:
        - cookieAuth: []
          csrfToken: []
      tags: [auth]
      responses:
        '200':
          description: 登出成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'
        '401':
          description: 未登录
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'

  /api/v1/auth/password:
    post:
      summary: 修改密码
      operationId: changePassword
      security:
        - cookieAuth: []
          csrfToken: []
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
      responses:
        '200':
          description: 修改成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'
        '400':
          description: 请求体非法 JSON
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'
        '401':
          description: 未登录或旧密码错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'
        '422':
          description: 新密码不符合规则
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'

  /api/v1/auth/me:
    get:
      summary: 获取当前登录用户信息
      operationId: getMe
      tags: [auth]
      responses:
        '200':
          description: 当前用户
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeResponse'
        '401':
          description: 未登录
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'

  /api/v1/auth/csrf:
    get:
      summary: 获取 CSRF token（同时设置 X-CSRF-Token 响应头）
      operationId: getCSRF
      tags: [auth]
      responses:
        '200':
          description: CSRF token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CSRFResponse'
        '401':
          description: 未登录
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'

  /api/v1/mode:
    get:
      summary: 获取 frpc/frps 模式开关状态
      operationId: getMode
      tags: [mode]
      responses:
        '200':
          description: 模式状态
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModeState'
        '401':
          description: 未登录
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'
    put:
      summary: 设置 frpc/frps 模式开关（变更后立即启停进程）
      operationId: putMode
      security:
        - cookieAuth: []
          csrfToken: []
      tags: [mode]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ModeState'
      responses:
        '200':
          description: 更新后的模式状态
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModeState'
        '400':
          description: 请求体非法 JSON
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'
        '401':
          description: 未登录
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'

  /api/v1/proxies:
    get:
      summary: 获取全部代理规则列表
      operationId: listProxies
      tags: [proxies]
      responses:
        '200':
          description: 代理规则数组
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProxyResponse'
        '401':
          description: 未登录
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'
    post:
      summary: 创建代理规则
      operationId: createProxy
      security:
        - cookieAuth: []
          csrfToken: []
      tags: [proxies]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProxyInput'
      responses:
        '201':
          description: 创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProxyResponse'
        '400':
          description: 请求体非法 JSON
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'
        '401':
          description: 未登录
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'
        '409':
          description: 代理名称冲突（CONFLICT，name 已被占用）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'
        '422':
          description: 校验失败（字段不合法、达到 200 条上限、(type,remotePort) 组合冲突等）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'

  /api/v1/proxies/{id}:
    put:
      summary: 更新代理规则（乐观锁，需携带 version 字段）
      operationId: updateProxy
      security:
        - cookieAuth: []
          csrfToken: []
      tags: [proxies]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProxyInput'
      responses:
        '200':
          description: 更新后的代理规则
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProxyResponse'
        '400':
          description: id 非法或请求体非法 JSON
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'
        '401':
          description: 未登录
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'
        '404':
          description: 规则不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'
        '409':
          description: 冲突（CONFLICT，版本冲突 version 不匹配，或代理名称已被占用）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'
        '422':
          description: 校验失败（字段不合法、(type,remotePort) 组合冲突等）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'
    delete:
      summary: 删除代理规则
      operationId: deleteProxy
      security:
        - cookieAuth: []
          csrfToken: []
      tags: [proxies]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: 删除成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'
        '400':
          description: id 非法
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'
        '401':
          description: 未登录
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'
        '404':
          description: 规则不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'

  /api/v1/server:
    get:
      summary: 获取 frps 服务端配置（token 默认脱敏）
      operationId: getServer
      tags: [config]
      parameters:
        - name: reveal
          in: query
          required: false
          schema:
            type: string
            enum: ["1"]
          description: 传 reveal=1 可获取原始 token（不脱敏）
      responses:
        '200':
          description: frps 配置
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FrpsConfig'
