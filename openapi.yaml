                $ref: '#/components/schemas/ProcStatusResponse'
        '401':
          description: 未登录
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'

  /api/v1/logs/{kind}:
    get:
      summary: 读取 frpc 或 frps 日志
      operationId: getLogs
      tags: [logs]
      parameters:
        - name: kind
          in: path
          required: true
          schema:
            type: string
            enum: [frpc, frps]
        - name: lines
          in: query
          required: false
          schema:
            type: integer
            default: 500
            minimum: 1
            maximum: 5000
          description: 返回末尾 N 行（不与 offset 同用）
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            format: int64
          description: 增量读取起始字节偏移；提供时忽略 lines 参数，返回增量格式响应
      responses:
        '200':
          description: |
            不携带 offset 时返回 LogsTailResponse；
            携带 offset 时返回 LogsIncrementalResponse。
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/LogsTailResponse'
                  - $ref: '#/components/schemas/LogsIncrementalResponse'
        '400':
          description: kind 非法
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'
        '401':
          description: 未登录
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'
        '404':
          description: 未配置日志路径
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'

