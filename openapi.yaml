          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'
        '404':
          description: kind 非法
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'
        '503':
          description: 下载器未初始化
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'

  /api/v1/system/download-cancel/{kind}:
    post:
      summary: 取消正在进行的 frpc / frps 下载（T-027）
      operationId: cancelDownload
      security:
        - cookieAuth: []
          csrfToken: []
      tags: [system]
      parameters:
        - name: kind
          in: path
          required: true
          schema:
            type: string
            enum: [frpc, frps]
      responses:
        '200':
          description: |
            返回取消后的最新 DownloadState。
            - 若 kind 当前在 downloading，则 ctx cancel 已触发，state.status=canceled。
            - 若 kind 不在 downloading（idle / success / failed / canceled），则 no-op，返回当前 state。
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DownloadState'
        '401':
          description: 未登录
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'
        '403':
          description: 缺 X-CSRF-Token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'
        '422':
          description: kind 非法（必须为 frpc 或 frps）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'
        '503':
          description: 下载器未初始化
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'

  # T-018 新增端点

  /api/v1/system/upload-bin:
    post:
      summary: 上传 frpc/frps 二进制（一键下载兜底）
      operationId: uploadBin
      security:
        - cookieAuth: []
          csrfToken: []
      tags: [system]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [kind, file]
              properties:
                kind:
                  type: string
                  enum: [frpc, frps]
                file:
                  type: string
                  format: binary
      responses:
        '200':
          description: 上传成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadBinResponse'
        '400':
          description: 请求不是合法的 multipart/form-data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'
        '401':
          description: 未登录
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'
        '403':
          description: 缺 CSRF token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'
        '409':
          description: 同 kind 上传或下载进行中
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'
        '413':
          description: 文件超过 64 MiB
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'
        '422':
          description: 字段非法 / 文件头非法 / 平台不匹配
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'

