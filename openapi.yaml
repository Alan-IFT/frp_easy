  /api/v1/system/download-bin:
    post:
      summary: 触发异步下载 frpc 或 frps 二进制
      operationId: downloadBin
      security:
        - cookieAuth: []
          csrfToken: []
      tags: [system]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DownloadBinRequest'
      responses:
        '202':
          description: 下载已开始（异步）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'
        '400':
          description: 请求体非法 JSON
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'
        '401':
          description: 未登录
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'
        '409':
          description: 下载已在进行中（PROC_BUSY）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'
        '422':
          description: kind 非法（必须为 frpc 或 frps）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'
        '503':
          description: 下载器未初始化或不支持当前 OS
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'

  /api/v1/system/download-status/{kind}:
